# Dataset sourcing and schema configuration.
# See docs/dataset_guide.md for the full rationale and how to provision
# each source.

amazon_reviews:
  # Dataset 1 (training): Amazon Review Polarity (Zhang et al.), a
  # user-provided local export since this session's egress policy blocks
  # the McAuley Lab / Hugging Face hosts. Headerless CSVs with fixed
  # columns [polarity, title, text]; polarity is 1 (Negative) or 2
  # (Positive) — this dataset is binary, there is no Neutral class.
  raw_data_dir: raw_data/amazon_reviews/amazon_review_polarity_csv
  train_file: train.csv
  test_file: test.csv
  columns: [polarity, title, text]

tweet_eval:
  # Dataset 2 (evaluation only): local export limited to the `sentiment`
  # task — every other TweetEval task (emotion, hate, irony, offensive,
  # ...) is ignored entirely.
  raw_data_dir: raw_data/tweeteval
  files:
    train: sentiment_train.csv
    validation: sentiment_validation.csv
    test: sentiment_test.csv
  # Column-name aliases checked in order (first match wins).
  text_columns: [text, tweet]
  label_columns: [label, sentiment]

reddit:
  # Dataset 3 (inference): historical Pushshift Reddit Submissions archive
  # (RS_YYYY-MM.zst), read directly — no manual decompression/conversion.
  # No live Reddit API is used anywhere.
  raw_data_dir: raw_data/reddit
  archive_file: RS_2019-04.zst
  subreddit_allowlist:
    [apple, samsung, GooglePixel, Android, OnePlus, gadgets, technology]
  sample_size: 20000 # default row cap; override via --sample-size

sample_size:
  smoke_test: 500
  full: null # no cap — full dataset
